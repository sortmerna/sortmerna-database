name: sortmerna-bench
channels:
  - conda-forge
  - bioconda
  - defaults
dependencies:
  # Core tools (SortMeRNA installed separately from source - see README)
  - vsearch>=2.22
  - seqkit>=2.5
  - barrnap>=0.9
  - infernal>=1.1.4

  # Python and libraries
  - python>=3.8
  - pytest>=7.0
  - pandas>=2.0
  - numpy>=1.24
  - matplotlib>=3.7
  - seaborn>=0.12
  - biopython>=1.81
  - scikit-bio>=0.6

  # R and libraries (for plotting/analysis)
  - r-base>=4.0
  - r-ggplot2
  - r-tidyverse
  - r-ggrepel
  - r-patchwork
  - r-cowplot

  # Simulation tools (for benchmarking phase)
  # insilicoseq installed via pip (conda only has 1.3.5; 2.x requires pip)
  - pbsim3>=3.0.0
  - fastp>=1.3.3

  - pip
  - pip:
    - InSilicoSeq>=2.0

  # Utilities
  - wget
  - curl
